# =============================================================================
# md2pdf — Docker Compose (VPS deployment)
# =============================================================================
#
# Usage:
#   docker compose up -d --build        # Build and start
#   docker compose logs -f md2pdf       # Follow logs
#   docker compose down                 # Stop everything
#
# To use with Traefik, uncomment the labels below and set your domain.
# To use with Caddy, see the commented caddy block.
# =============================================================================

services:
  md2pdf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: md2pdf
    restart: unless-stopped
    ports:
      - "${MD2PDF_PORT:-8050}:8050"
    environment:
      - PYTHONUNBUFFERED=1
    # Resource limits — Chromium can be memory-hungry
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    # Intermediate PDF temp files — use tmpfs for performance
    tmpfs:
      - /tmp:size=256M

    # -------------------------------------------------------------------------
    # Traefik reverse proxy (uncomment if using Traefik)
    # -------------------------------------------------------------------------
    # labels:
    #   - "traefik.enable=true"
